<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수강문의 · 온택잉글리쉬 ONTACT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --ink:#12273d; --ink2:#1d3a5a; --coral:#ef6a48; --coral-deep:#d4512c;
    --muted:#5d6b7a; --line:#e3ddd0; --cream:#fbf3ee; --paper:#f6f4ef; --teal:#2c7a73;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{word-break:keep-all;overflow-wrap:break-word;font-family:Pretendard,-apple-system,sans-serif;color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--coral-deep);text-decoration:none}
  .wrap{max-width:820px;margin:0 auto;padding:0 18px}

  header{background:var(--ink);color:#fff;padding:13px 0;position:sticky;top:0;z-index:10}
  header .wrap{display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:.5em;font-family:'Fraunces',serif;font-weight:900;font-size:1.15rem;color:#fff}
  .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--coral)}
  .back{color:rgba(255,255,255,.85);font-size:.85rem}
  .back:hover{color:#fff}

  .hero{margin:24px 0 16px}
  .hero h1{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:900;margin-bottom:4px}
  .hero p{color:var(--muted);font-size:.92rem}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .count{font-size:.88rem;color:var(--muted)}
  .btn{display:inline-flex;align-items:center;gap:.4em;background:var(--coral);color:#fff;border:none;border-radius:999px;padding:.7em 1.3em;font-weight:800;font-size:.9rem;cursor:pointer;font-family:inherit}
  .btn:hover{background:var(--coral-deep)}
  .btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn-ghost:hover{border-color:var(--ink)}

  .board{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .row{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .row:last-child{border-bottom:none}
  .row:hover{background:var(--cream)}
  .row .ttl{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .lock{color:var(--muted);font-weight:700}
  .row .who{font-size:.85rem;color:var(--muted);white-space:nowrap}
  .row .date{font-size:.8rem;color:var(--muted);white-space:nowrap}
  .badge{font-size:.72rem;font-weight:700;padding:.2em .6em;border-radius:999px;white-space:nowrap}
  .b-wait{background:#fdeee9;color:var(--coral-deep)}
  .b-done{background:#e6f6ec;color:#2e7d32}
  .empty{padding:40px;text-align:center;color:var(--muted)}

  /* modal */
  .modal{display:none;position:fixed;inset:0;background:rgba(12,27,43,.55);z-index:100;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px)}
  .modal.on{display:flex}
  .box{background:#fff;border-radius:18px;max-width:540px;width:100%;max-height:90vh;overflow:auto;padding:26px}
  .box h2{font-size:1.2rem;margin-bottom:14px}
  .box .x{float:right;border:none;background:none;font-size:1.5rem;cursor:pointer;color:var(--muted);line-height:1}
  label{display:block;font-size:.8rem;font-weight:700;color:var(--muted);margin:14px 0 5px}
  input,textarea{width:100%;padding:.8em 1em;border:1.5px solid var(--line);border-radius:10px;font-family:inherit;font-size:.95rem}
  input:focus,textarea:focus{outline:none;border-color:var(--coral)}
  textarea{resize:vertical;min-height:120px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .secret-row{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap}
  .chk{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-weight:700;font-size:.9rem;
       background:var(--cream);border:1.5px solid var(--line);border-radius:10px;padding:.6em 1em}
  .chk input{width:auto}
  .chk.on{border-color:var(--coral);background:#fdeee9;color:var(--coral-deep)}
  .link-btn{background:none;border:none;color:var(--muted);text-decoration:underline;cursor:pointer;font-size:.85rem;font-family:inherit}
  .msg{font-size:.85rem;margin-top:12px;min-height:1.1em}
  .note{background:var(--cream);border-radius:10px;padding:10px 14px;font-size:.83rem;color:var(--muted);margin-top:6px}

  .view-meta{font-size:.85rem;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px}
  .view-body{white-space:pre-wrap;font-size:.95rem;line-height:1.7}
  .answer-box{margin-top:18px;background:#eef6f4;border-left:4px solid var(--teal);border-radius:0 10px 10px 0;padding:14px 16px}
  .answer-box h3{font-size:.95rem;color:var(--teal);margin-bottom:6px}
  .answer-box .a-body{white-space:pre-wrap;font-size:.93rem}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <a href="index.html" class="logo"><span class="dot"></span>ONTACT<small style="font-weight:600;font-size:.6rem;letter-spacing:.2em;opacity:.7"> 화상영어</small></a>
    <a href="index.html" class="back">← 홈으로</a>
  </div>
</header>

<div class="wrap">
  <div class="hero">
    <h1>수강문의</h1>
    <p>궁금한 점을 남겨주시면 확인 후 답변드립니다. 회원가입 없이 작성하실 수 있어요.</p>
  </div>

  <div class="toolbar">
    <span class="count" id="count">불러오는 중…</span>
    <button class="btn" id="write-btn">✏️ 문의 작성</button>
  </div>

  <div class="board" id="board"><div class="empty">불러오는 중…</div></div>
</div>

<!-- 작성 모달 -->
<div class="modal" id="write-modal">
  <div class="box">
    <button class="x" id="write-x">×</button>
    <h2>문의 작성</h2>
    <div class="grid2">
      <div><label>이름 *</label><input id="w-name" placeholder="홍길동"></div>
      <div><label>휴대폰 번호</label><input id="w-phone" placeholder="010-0000-0000" inputmode="numeric"></div>
    </div>
    <label>비밀번호 *</label>
    <input id="w-pw" type="password" placeholder="글 확인용 간단 비밀번호">
    <div class="note">비밀번호는 <b>비밀글 확인</b> 시 필요합니다. 잊지 않도록 기억해 주세요.</div>
    <label>제목 *</label>
    <input id="w-title" placeholder="문의 제목">
    <label>내용</label>
    <textarea id="w-body" placeholder="문의하실 내용을 적어주세요."></textarea>

    <div class="secret-row">
      <label class="chk" id="secret-chk" style="margin:0">
        <input type="checkbox" id="w-secret"> 🔒 비밀글로 작성
      </label>
      <button type="button" class="link-btn" id="secret-clear">비밀글 선택취소</button>
    </div>
    <div class="note">비밀글은 목록에서 제목이 <b>🔒 비밀글</b>로, 이름은 <b>첫 글자만</b> 보이고 나머지는 별표(*)로 표시됩니다. 작성자 본인(비밀번호)과 관리자만 내용을 볼 수 있어요.</div>

    <button class="btn" id="w-submit" style="width:100%;margin-top:18px;justify-content:center">등록하기</button>
    <div class="msg" id="w-msg"></div>
  </div>
</div>

<!-- 조회 모달 -->
<div class="modal" id="view-modal">
  <div class="box">
    <button class="x" id="view-x">×</button>
    <div id="view-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://nhydhyolgrhsykdcqfzb.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeWRoeW9sZ3Joc3lrZGNxZnpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTk1OTAsImV4cCI6MjA5NTk5NTU5MH0.s3qPFFN-4zMLAt-dtkOwzakCj-pkglKgbhyUR9uu4xs";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
const esc=s=>(s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmtDate=d=>{const x=new Date(d);return `${x.getFullYear()}.${String(x.getMonth()+1).padStart(2,"0")}.${String(x.getDate()).padStart(2,"0")}`;};

// ── 목록 ──
async function loadList(){
  const {data,error}=await sb.rpc("list_inquiries",{p_limit:100,p_offset:0});
  const board=$("board");
  if(error){ board.innerHTML=`<div class="empty">목록을 불러오지 못했습니다.<br><small>${esc(error.message)}</small></div>`; $("count").textContent=""; return; }
  const rows=data||[];
  $("count").textContent=`총 ${rows.length}건`;
  if(rows.length===0){ board.innerHTML=`<div class="empty">아직 등록된 문의가 없습니다. 첫 문의를 남겨보세요!</div>`; return; }
  board.innerHTML=rows.map(r=>{
    const title = r.is_secret
      ? `<span class="lock">🔒 비밀글</span>`
      : esc(r.display_title);
    const badge = r.has_answer || r.status==="answered"
      ? `<span class="badge b-done">답변완료</span>`
      : `<span class="badge b-wait">답변대기</span>`;
    return `<div class="row" data-id="${r.id}" data-secret="${r.is_secret}">
      <span class="ttl">${title}</span>
      ${badge}
      <span class="who">${esc(r.display_name)}</span>
      <span class="date">${fmtDate(r.created_at)}</span>
    </div>`;
  }).join("");
  board.querySelectorAll(".row").forEach(el=>{
    el.onclick=()=>openView(el.dataset.id, el.dataset.secret==="true");
  });
}

// ── 작성 ──
const wModal=$("write-modal");
$("write-btn").onclick=()=>{ wModal.classList.add("on"); };
$("write-x").onclick=()=>wModal.classList.remove("on");
wModal.onclick=e=>{ if(e.target===wModal) wModal.classList.remove("on"); };

// 비밀글 토글 UI
function syncSecret(){ $("secret-chk").classList.toggle("on", $("w-secret").checked); }
$("w-secret").onchange=syncSecret;
$("secret-clear").onclick=()=>{ $("w-secret").checked=false; syncSecret(); };

$("w-submit").onclick=async()=>{
  const name=$("w-name").value.trim(), phone=$("w-phone").value.trim(),
        pw=$("w-pw").value, title=$("w-title").value.trim(),
        body=$("w-body").value, secret=$("w-secret").checked;
  const msg=$("w-msg");
  if(!name){ msg.textContent="이름을 입력해 주세요."; msg.style.color=getComputedStyle(document.documentElement).getPropertyValue('--coral-deep'); return; }
  if(!title){ msg.textContent="제목을 입력해 주세요."; msg.style.color="#d4512c"; return; }
  if(!pw||pw.length<2){ msg.textContent="비밀번호를 입력해 주세요."; msg.style.color="#d4512c"; return; }
  $("w-submit").disabled=true; msg.style.color="#5d6b7a"; msg.textContent="등록 중…";
  const {error}=await sb.rpc("create_inquiry",{
    p_name:name, p_phone:phone, p_password:pw,
    p_title:title, p_body:body, p_is_secret:secret
  });
  $("w-submit").disabled=false;
  if(error){ msg.style.color="#d4512c"; msg.textContent="등록 실패: "+error.message; return; }
  msg.style.color="#2e7d32"; msg.textContent="✅ 등록되었습니다.";
  ["w-name","w-phone","w-pw","w-title","w-body"].forEach(id=>$(id).value="");
  $("w-secret").checked=false; syncSecret();
  setTimeout(()=>{ wModal.classList.remove("on"); msg.textContent=""; loadList(); }, 700);
};

// ── 조회 ──
const vModal=$("view-modal");
$("view-x").onclick=()=>vModal.classList.remove("on");
vModal.onclick=e=>{ if(e.target===vModal) vModal.classList.remove("on"); };

async function openView(id, isSecret){
  vModal.classList.add("on");
  const c=$("view-content");
  let pw=null;
  if(isSecret){
    c.innerHTML=`
      <h2>🔒 비밀글</h2>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:12px">작성 시 입력한 비밀번호를 입력하세요.</p>
      <input id="vp" type="password" placeholder="비밀번호" autofocus>
      <button class="btn" id="vp-btn" style="width:100%;margin-top:14px;justify-content:center">확인</button>
      <div class="msg" id="vp-msg"></div>`;
    return new Promise(()=>{
      const go=async()=>{
        pw=$("vp").value;
        if(!pw){ $("vp-msg").style.color="#d4512c"; $("vp-msg").textContent="비밀번호를 입력하세요."; return; }
        await fetchAndRender(id, pw);
      };
      $("vp-btn").onclick=go;
      $("vp").onkeydown=e=>{ if(e.key==="Enter") go(); };
    });
  }
  await fetchAndRender(id, null);
}

async function fetchAndRender(id, pw){
  const c=$("view-content");
  const {data,error}=await sb.rpc("view_inquiry",{p_id:id, p_password:pw});
  if(error){
    const m=$("vp-msg");
    if(m){ m.style.color="#d4512c"; m.textContent=error.message; return; }
    c.innerHTML=`<h2>오류</h2><p style="color:#d4512c">${esc(error.message)}</p>`; return;
  }
  const r=Array.isArray(data)?data[0]:data;
  if(!r){ c.innerHTML=`<h2>오류</h2><p>글을 찾을 수 없습니다.</p>`; return; }
  const answered = r.answer && r.answer.length>0;
  c.innerHTML=`
    <h2>${r.is_secret?'🔒 ':''}${esc(r.title)}</h2>
    <div class="view-meta">${esc(r.name)} · ${fmtDate(r.created_at)} ·
      ${answered?'<span class="badge b-done">답변완료</span>':'<span class="badge b-wait">답변대기</span>'}</div>
    <div class="view-body">${esc(r.body)||'<span style="color:var(--muted)">(내용 없음)</span>'}</div>
    ${answered?`
      <div class="answer-box">
        <h3>💬 온택 답변</h3>
        <div class="a-body">${esc(r.answer)}</div>
        ${r.answered_at?`<div style="font-size:.78rem;color:var(--muted);margin-top:8px">${fmtDate(r.answered_at)}</div>`:''}
      </div>`:`
      <div class="note" style="margin-top:16px">아직 답변이 등록되지 않았습니다. 확인 후 답변드리겠습니다.</div>`}`;
}

loadList();
</script>
</body>
</html>
