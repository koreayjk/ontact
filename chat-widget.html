<!--
  ============================================================
  온택 채팅 위젯 — chat-widget.html
  ============================================================
  역할별 언어: manager/teacher → 영어, student/admin → 한국어
-->

<style>
  /* 채팅 도크 — 오른쪽 아래 고정 */
  .chat-dock {
    position: fixed;
    bottom: 0;
    right: 20px;
    z-index: 998;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    pointer-events: none;
  }
  .chat-dock > * { pointer-events: auto; }

  /* 최소화된 도크 버튼 (오른쪽 끝) */
  .chat-tab {
    background: #12273d;
    color: #fff;
    border: 0;
    padding: 10px 16px;
    border-radius: 12px 12px 0 0;
    font: inherit;
    font-weight: 700;
    font-size: .9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 -4px 20px rgba(0,0,0,.15);
    transition: all .15s;
  }
  .chat-tab:hover { background: #1d3a5a; transform: translateY(-1px); }
  .chat-tab .badge {
    background: #ef6a48;
    color: #fff;
    border-radius: 999px;
    padding: 1px 8px;
    font-size: .72rem;
    font-weight: 700;
  }
  .chat-tab.hidden { display: none; }

  /* 열린 채팅 목록 패널 */
  .chat-list-panel {
    width: 320px;
    height: 480px;
    background: #fff;
    border-radius: 12px 12px 0 0;
    box-shadow: 0 -8px 30px rgba(0,0,0,.2);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-list-panel.open { display: flex; }
  .chat-list-panel .head {
    background: #12273d;
    color: #fff;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .chat-list-panel .head h3 { font-size: 1rem; font-weight: 700; }
  .chat-list-panel .head button {
    background: transparent;
    border: 0;
    color: #fff;
    cursor: pointer;
    font-size: 1.2rem;
    padding: 0 4px;
  }
  .chat-list-panel .search {
    padding: 10px;
    border-bottom: 1px solid #e3ddd0;
  }
  .chat-list-panel .search input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #e3ddd0;
    border-radius: 8px;
    font: inherit;
    font-size: .88rem;
  }
  .chat-list-panel .list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .chat-list-panel .conv-row {
    padding: 10px 14px;
    border-bottom: 1px solid #f6f4ef;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    transition: background .15s;
  }
  .chat-list-panel .conv-row:hover { background: #f9f7f2; }
  .chat-list-panel .conv-row .who {
    flex: 1;
    overflow: hidden;
  }
  .chat-list-panel .conv-row .who b {
    display: block;
    font-size: .92rem;
    color: #12273d;
    margin-bottom: 2px;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }
  .chat-list-panel .conv-row .who .preview {
    font-size: .8rem;
    color: #6b7785;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }
  .chat-list-panel .conv-row .role-tag {
    font-size: .7rem;
    background: #f6f4ef;
    color: #6b7785;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 4px;
    font-weight: 600;
  }
  .chat-list-panel .conv-row .unread {
    background: #ef6a48;
    color: #fff;
    border-radius: 999px;
    padding: 2px 7px;
    font-size: .7rem;
    font-weight: 700;
    min-width: 18px;
    text-align: center;
  }
  .chat-list-panel .empty {
    padding: 20px;
    text-align: center;
    color: #6b7785;
    font-size: .85rem;
  }
  .chat-list-panel .group-label {
    padding: 8px 14px 4px;
    font-size: .72rem;
    color: #6b7785;
    text-transform: uppercase;
    letter-spacing: .04em;
    font-weight: 700;
    background: #f9f7f2;
  }

  /* 채팅 창 (1:1 메시지) */
  .chat-room {
    width: 320px;
    height: 480px;
    background: #fff;
    border-radius: 12px 12px 0 0;
    box-shadow: 0 -8px 30px rgba(0,0,0,.2);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-room.open { display: flex; }
  .chat-room .head {
    background: #12273d;
    color: #fff;
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .chat-room .head .info { flex: 1; min-width: 0; }
  .chat-room .head .info b {
    display: block;
    font-size: .95rem;
    font-weight: 700;
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
  }
  .chat-room .head .info .role-tag {
    font-size: .72rem;
    color: #b8c4d3;
    background: rgba(255,255,255,.1);
    padding: 1px 6px;
    border-radius: 4px;
    margin-top: 2px;
    display: inline-block;
  }
  .chat-room .head button {
    background: transparent;
    border: 0;
    color: #fff;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 4px;
  }
  .chat-room .messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    background: #f9f7f2;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .chat-room .messages .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: .9rem;
    line-height: 1.5;
    word-wrap: break-word;
    word-break: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
    box-sizing: border-box;
    margin: 0;
    min-height: auto;
    height: auto;
  }
  .chat-room .messages .msg.mine {
    background: #12273d;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .chat-room .messages .msg.theirs {
    background: #fff;
    color: #12273d;
    align-self: flex-start;
    border: 1px solid #e3ddd0;
    border-bottom-left-radius: 4px;
  }
  .chat-room .messages .msg-time {
    font-size: .68rem;
    color: #6b7785;
    margin-top: 2px;
  }
  .chat-room .messages .msg.mine + .msg-time { text-align: right; }
  .chat-room .messages .date-divider {
    text-align: center;
    color: #6b7785;
    font-size: .72rem;
    margin: 8px 0;
    font-weight: 600;
  }
  .chat-room .input-area {
    border-top: 1px solid #e3ddd0;
    padding: 10px;
    display: flex;
    gap: 6px;
    background: #fff;
  }
  .chat-room .input-area textarea {
    flex: 1;
    border: 1px solid #e3ddd0;
    border-radius: 8px;
    padding: 6px 10px;
    font: inherit;
    font-size: .88rem;
    resize: none;
    height: 36px;
    max-height: 80px;
  }
  .chat-room .input-area textarea:focus {
    outline: none;
    border-color: #12273d;
  }
  .chat-room .input-area button {
    background: #ef6a48;
    color: #fff;
    border: 0;
    padding: 0 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: .85rem;
  }
  .chat-room .input-area button:hover { background: #d4512c; }
  .chat-room .input-area button:disabled { opacity: .5; cursor: not-allowed; }

  /* 모바일 */
  @media (max-width: 540px) {
    .chat-dock { right: 0; left: 0; }
    .chat-list-panel, .chat-room { width: 100%; height: 70vh; border-radius: 12px 12px 0 0; }
    .chat-tab { border-radius: 12px 0 0 0; margin-left: auto; }
  }

  /* 비로그인 시 숨김 */
  .chat-dock.hidden { display: none; }

  /* 온라인 상태 표시 */
  .online-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2e7d32;
    box-shadow: 0 0 0 2px #fff;
    margin-left: 4px;
    flex-shrink: 0;
  }
  .offline-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #d4d4d4;
    margin-left: 4px;
    flex-shrink: 0;
  }
  .chat-room .head .online-dot,
  .chat-room .head .offline-dot {
    box-shadow: 0 0 0 2px #12273d;
    margin-left: 6px;
  }
  .conv-row .who b {
    display: flex !important;
    align-items: center;
    gap: 4px;
  }
</style>

<div class="chat-dock hidden" id="chat-dock">
  <div class="chat-list-panel" id="chat-list-panel">
    <div class="head">
      <h3 id="chat-panel-title">💬 채팅</h3>
      <button onclick="toggleChatDock()">▼</button>
    </div>
    <div class="search">
      <input type="search" id="chat-search" placeholder="🔎 이름·이메일로 검색해 새 대화 시작">
    </div>
    <div class="list" id="chat-list">
      <div class="empty" id="chat-loading-text">불러오는 중…</div>
    </div>
  </div>

  <div class="chat-room" id="chat-room">
    <div class="head">
      <button onclick="closeChatRoom()">←</button>
      <div class="info">
        <b id="chat-room-name">—</b>
        <span class="role-tag" id="chat-room-role"></span>
      </div>
      <button onclick="closeChatRoom()">✕</button>
    </div>
    <div class="messages" id="chat-messages"></div>
    <div class="input-area">
      <textarea id="chat-input" rows="1"></textarea>
      <button id="chat-send" onclick="sendChatMessage()"></button>
    </div>
  </div>

  <button class="chat-tab" id="chat-tab" onclick="toggleChatDock()">
    <span id="chat-tab-label">💬 채팅</span>
    <span class="badge" id="chat-total-unread" style="display:none">0</span>
  </button>
</div>

<div id="chat-broadcast-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:14px;padding:24px;max-width:480px;width:100%;max-height:80vh;display:flex;flex-direction:column;font-family:'Hanken Grotesk',sans-serif">
    <h3 id="chat-bc-title" style="font-size:1.15rem;margin-bottom:6px;color:#12273d"></h3>
    <p id="chat-bc-sub" style="font-size:.82rem;color:#6b7785;margin-bottom:14px"></p>
    <textarea id="chat-bc-content" style="width:100%;border:1px solid #e3ddd0;border-radius:10px;padding:12px;font:inherit;font-size:.9rem;resize:vertical;min-height:120px;margin-bottom:10px;box-sizing:border-box"></textarea>
    <div id="chat-bc-info" style="font-size:.78rem;color:#c98a1f;background:#fff7e6;border:1px solid #c98a1f;padding:8px 10px;border-radius:6px;margin-bottom:14px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="chat-bc-cancel" onclick="closeBroadcastModal()" style="background:#fff;border:1px solid #6b7785;color:#6b7785;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85rem"></button>
      <button id="chat-bc-send" onclick="confirmBroadcast()" style="background:#c98a1f;color:#fff;border:0;padding:8px 18px;border-radius:8px;cursor:pointer;font-weight:700;font-size:.85rem"></button>
    </div>
  </div>
</div>

<script>
(function(){
  const _sb = window.sb;
  if(!_sb){ console.warn("[chat] window.sb not found. Chat disabled."); return; }

  let _me = null;
  let _conversations = [];
  let _activeConvId = null;
  let _messages = [];
  let _possibleContacts = [];
  let _realtimeChannel = null;
  let _presenceChannel = null;
  let _onlineUsers = new Set();

  // ============================================================
  // 다국어 — 매니저/강사는 영어, 학생/관리자는 한국어
  // ============================================================
  let _isEn = false; // init에서 결정됨
  
  const I18N = {
    kr: {
      chatTitle: "💬 채팅",
      searchPh: "🔎 이름·이메일로 검색해 새 대화 시작",
      loading: "불러오는 중…",
      inputPh: "메시지 입력… (Enter 전송)",
      sendBtn: "전송",
      bcTitle: "📢 전체 공지 보내기",
      bcSub: "모든 대상에게 1:1 메시지로 자동 발송됩니다.",
      bcContentPh: "공지 내용을 입력하세요…",
      cancel: "취소",
      bcSend: "📢 발송",
      // 역할 라벨
      roleStudent: "학생", roleTeacher: "강사", roleManager: "매니저", roleAdmin: "총관리자",
      // 카테고리 라벨
      ongoingConvs: "진행 중인 대화",
      contactsManager: "매니저",
      contactsAdminTeacher: "관리자 · 강사",
      contactsAvailable: "연락 가능",
      searchResults: "검색 결과",
      // 빈 상태
      noSearchResults: (q) => `"${q}" 검색 결과가 없습니다.`,
      noConvs: "아직 대화가 없습니다",
      startConvHint: "위 검색창에 이름을 입력해<br>새 대화를 시작하세요.",
      startChat: "대화를 시작해보세요",
      noMessages: "아직 메시지가 없습니다. 먼저 인사를 보내보세요.",
      // 단체 발송
      broadcastBtnStudents: "📢 전체 학생에게 공지",
      broadcastBtnTeachers: "📢 전체 강사에게 공지",
      broadcastTitleStudents: "📢 전체 학생에게 공지",
      broadcastTitleTeachers: "📢 전체 강사에게 공지",
      broadcastSubStudents: "모든 학생에게 1:1 메시지로 자동 발송됩니다.",
      broadcastSubTeachers: "모든 강사에게 1:1 메시지로 자동 발송됩니다.",
      broadcastInfoStudents: (n) => `현재 등록된 학생: <b>${n}명</b>. 발송 시 각 학생의 1:1 대화방에 "📢 단체 공지" 표시와 함께 도착합니다.`,
      broadcastInfoTeachers: (n) => `현재 등록된 강사: <b>${n}명</b>. 발송 시 각 강사의 1:1 대화방에 "📢 단체 공지" 표시와 함께 도착합니다.`,
      broadcastConfirmStudents: (n, content) => `${n}명의 학생에게 다음 공지를 발송합니다.\n\n"${content}"\n\n진행할까요?`,
      broadcastConfirmTeachers: (n, content) => `${n}명의 강사에게 다음 공지를 발송합니다.\n\n"${content}"\n\n진행할까요?`,
      broadcastEnter: "공지 내용을 입력하세요.",
      broadcastSending: "발송 중…",
      broadcastSendFailed: "발송 실패: ",
      broadcastDone: (n) => `✅ ${n}명에게 발송 완료`,
      // 메시지
      broadcastLabel: "📢 단체 공지",
      online: "온라인",
      offline: "오프라인",
      sendFailed: "전송 실패: ",
      convCreateFailed: "대화 방 생성 실패. 권한이 없는 상대일 수 있습니다.",
      // 날짜
      dateLocale: "ko-KR",
    },
    en: {
      chatTitle: "💬 Chat",
      searchPh: "🔎 Search by name or email to start a new chat",
      loading: "Loading…",
      inputPh: "Type a message… (Enter to send)",
      sendBtn: "Send",
      bcTitle: "📢 Send Broadcast Notice",
      bcSub: "Will be automatically sent as 1:1 messages to all recipients.",
      bcContentPh: "Enter notice content…",
      cancel: "Cancel",
      bcSend: "📢 Send",
      roleStudent: "Student", roleTeacher: "Teacher", roleManager: "Manager", roleAdmin: "Admin",
      ongoingConvs: "Ongoing chats",
      contactsManager: "Manager",
      contactsAdminTeacher: "Admin · Teachers",
      contactsAvailable: "Available contacts",
      searchResults: "Search results",
      noSearchResults: (q) => `No results for "${q}".`,
      noConvs: "No chats yet",
      startConvHint: "Use the search above to find<br>someone and start a chat.",
      startChat: "Start a conversation",
      noMessages: "No messages yet. Say hi first.",
      broadcastBtnStudents: "📢 Notice to all students",
      broadcastBtnTeachers: "📢 Notice to all teachers",
      broadcastTitleStudents: "📢 Notice to all students",
      broadcastTitleTeachers: "📢 Notice to all teachers",
      broadcastSubStudents: "Will be sent as 1:1 messages to all students.",
      broadcastSubTeachers: "Will be sent as 1:1 messages to all teachers.",
      broadcastInfoStudents: (n) => `Total students: <b>${n}</b>. Each will receive this in their 1:1 chat marked as "📢 Broadcast".`,
      broadcastInfoTeachers: (n) => `Total teachers: <b>${n}</b>. Each will receive this in their 1:1 chat marked as "📢 Broadcast".`,
      broadcastConfirmStudents: (n, content) => `Send this notice to ${n} students?\n\n"${content}"\n\nContinue?`,
      broadcastConfirmTeachers: (n, content) => `Send this notice to ${n} teachers?\n\n"${content}"\n\nContinue?`,
      broadcastEnter: "Please enter the notice content.",
      broadcastSending: "Sending…",
      broadcastSendFailed: "Send failed: ",
      broadcastDone: (n) => `✅ Sent to ${n} recipients`,
      broadcastLabel: "📢 Broadcast",
      online: "Online",
      offline: "Offline",
      sendFailed: "Send failed: ",
      convCreateFailed: "Could not create conversation. You may not have permission to chat with this person.",
      dateLocale: "en-US",
    }
  };
  
  let T = I18N.kr; // 기본 한국어, init에서 결정
  
  // 역할 라벨 가져오기
  function roleLabel(role){
    return T["role" + role.charAt(0).toUpperCase() + role.slice(1)] || role;
  }

  // ─── 초기화 ───
  async function init(){
    const { data:{ user } } = await _sb.auth.getUser();
    if(!user){ return; }

    const { data:profile } = await _sb.from("profiles").select("id,role,full_name,email").eq("id",user.id).single();
    if(!profile){ return; }

    _me = profile;
    
    // 매니저/강사는 영어, 그 외는 한국어
    _isEn = (_me.role === "manager" || _me.role === "teacher");
    T = _isEn ? I18N.en : I18N.kr;
    applyI18N();
    
    document.getElementById("chat-dock").classList.remove("hidden");

    try {
      await loadConversations();
      await loadPossibleContacts();
      renderChatList();
      setupRealtime();
      setupPresence();
      setupSearchHandler();
      setupInputHandler();
    } catch(e) {
      console.error("[chat] init partial failure:", e);
    }
  }
  
  // ─── i18n 적용 (정적 라벨) ───
  function applyI18N(){
    document.getElementById("chat-panel-title").textContent = T.chatTitle;
    document.getElementById("chat-tab-label").textContent = T.chatTitle;
    document.getElementById("chat-search").placeholder = T.searchPh;
    document.getElementById("chat-loading-text").textContent = T.loading;
    document.getElementById("chat-input").placeholder = T.inputPh;
    document.getElementById("chat-send").textContent = T.sendBtn;
    document.getElementById("chat-bc-content").placeholder = T.bcContentPh;
    document.getElementById("chat-bc-cancel").textContent = T.cancel;
  }

  async function loadPossibleContacts(){
    let roles = [];
    if(_me.role === "student") roles = ["admin"];
    else if(_me.role === "teacher") roles = ["manager"];
    else if(_me.role === "manager") roles = ["teacher", "admin"];
    else if(_me.role === "admin") roles = ["student", "manager"];

    if(roles.length === 0){ _possibleContacts = []; return; }
    const { data } = await _sb.from("profiles").select("id,role,full_name,email").in("role", roles).order("role").order("full_name", { nullsFirst:false });
    _possibleContacts = data || [];
  }

  async function loadConversations(){
    const { data:convs } = await _sb.from("conversations")
      .select("id, type, participant_a, participant_b, last_message_at, last_message_preview")
      .or(`participant_a.eq.${_me.id},participant_b.eq.${_me.id}`)
      .order("last_message_at", { ascending: false });

    if(!convs || convs.length === 0){ _conversations = []; return; }

    const otherIds = convs.map(c => c.participant_a === _me.id ? c.participant_b : c.participant_a);
    const { data:others } = await _sb.from("profiles").select("id, role, full_name, email").in("id", otherIds);
    const otherMap = {};
    (others || []).forEach(p => otherMap[p.id] = p);

    const { data:reads } = await _sb.from("message_reads").select("conversation_id, last_read_at").eq("user_id", _me.id);
    const readMap = {};
    (reads || []).forEach(r => readMap[r.conversation_id] = r.last_read_at);

    const convIds = convs.map(c => c.id);
    const { data:recentMsgs } = await _sb.from("messages")
      .select("conversation_id, sender_id, created_at")
      .in("conversation_id", convIds)
      .order("created_at", { ascending: false })
      .limit(200);
    const unreadMap = {};
    (recentMsgs || []).forEach(m => {
      if(m.sender_id === _me.id) return;
      const lastRead = readMap[m.conversation_id] || "1970-01-01";
      if(m.created_at > lastRead){
        unreadMap[m.conversation_id] = (unreadMap[m.conversation_id] || 0) + 1;
      }
    });

    _conversations = convs.map(c => {
      const otherId = c.participant_a === _me.id ? c.participant_b : c.participant_a;
      return {
        id: c.id,
        type: c.type,
        other: otherMap[otherId] || { id: otherId, role: "?", full_name: "(unknown)" },
        last_message_at: c.last_message_at,
        last_message_preview: c.last_message_preview,
        unread: unreadMap[c.id] || 0,
      };
    });
  }

  function renderChatList(){
    const searchQ = (document.getElementById("chat-search").value || "").trim().toLowerCase();
    const listEl = document.getElementById("chat-list");

    const matchesQ = (p) => {
      if(!searchQ) return true;
      return (`${p.full_name || ""} ${p.email || ""}`).toLowerCase().includes(searchQ);
    };

    const totalUnread = _conversations.reduce((s, c) => s + c.unread, 0);
    const badge = document.getElementById("chat-total-unread");
    if(totalUnread > 0){ badge.textContent = totalUnread; badge.style.display = "inline-block"; }
    else { badge.style.display = "none"; }

    let alwaysVisibleRoles = [];
    if(_me.role === "admin") alwaysVisibleRoles = ["manager"];
    else if(_me.role === "manager") alwaysVisibleRoles = ["admin", "teacher"];
    else if(_me.role === "teacher") alwaysVisibleRoles = ["manager"];

    const alwaysVisible = _possibleContacts.filter(p => alwaysVisibleRoles.includes(p.role));
    const existingOtherIds = new Set(_conversations.map(c => c.other.id));

    const filteredConvs = _conversations.filter(c => matchesQ(c.other));
    const visibleNoConvYet = alwaysVisible.filter(p => !existingOtherIds.has(p.id) && matchesQ(p));

    let extraSearchResults = [];
    if(searchQ){
      const alwaysVisibleIds = new Set(alwaysVisible.map(p => p.id));
      extraSearchResults = _possibleContacts.filter(p => 
        !existingOtherIds.has(p.id) && 
        !alwaysVisibleIds.has(p.id) && 
        matchesQ(p)
      );
    }

    let html = "";

    if(!searchQ && (_me.role === "admin" || _me.role === "manager")){
      const broadcastLabel = _me.role === "admin" ? T.broadcastBtnStudents : T.broadcastBtnTeachers;
      html += `<div style="padding:10px 14px;border-bottom:1px solid #f6f4ef">
        <button id="chat-broadcast-btn" style="width:100%;background:#fff7e6;border:1.5px dashed #c98a1f;color:#c98a1f;padding:9px;border-radius:8px;font-weight:700;cursor:pointer;font-size:.85rem">
          ${broadcastLabel}
        </button>
      </div>`;
    }

    if(filteredConvs.length > 0){
      html += `<div class="group-label">${T.ongoingConvs}</div>`;
      html += filteredConvs.map(c => convRowHTML(c.other, c.last_message_preview, c.unread, c.id)).join("");
    }

    if(visibleNoConvYet.length > 0){
      const label = _me.role === "admin" ? T.contactsManager : 
                    _me.role === "manager" ? T.contactsAdminTeacher : 
                    T.contactsAvailable;
      html += `<div class="group-label">${label}</div>`;
      html += visibleNoConvYet.map(p => convRowHTML(p, "", 0, null)).join("");
    }

    if(extraSearchResults.length > 0){
      html += `<div class="group-label">${T.searchResults}</div>`;
      html += extraSearchResults.map(p => convRowHTML(p, "", 0, null)).join("");
    }

    if(html === "" || (!searchQ && filteredConvs.length === 0 && visibleNoConvYet.length === 0 && !(_me.role === "admin" || _me.role === "manager"))){
      if(searchQ){
        html += `<div class="empty">${T.noSearchResults(escapeHtml(searchQ))}</div>`;
      } else if(_conversations.length === 0 && visibleNoConvYet.length === 0){
        html += `<div class="empty" style="padding:30px 20px;line-height:1.6">
          <div style="font-size:2rem;margin-bottom:10px">💬</div>
          <b style="color:#12273d">${T.noConvs}</b><br>
          <span style="font-size:.82rem">${T.startConvHint}</span>
        </div>`;
      }
    }

    listEl.innerHTML = html;
    listEl.querySelectorAll(".conv-row").forEach(row => {
      row.onclick = () => openChatRoom(row.dataset.otherId, row.dataset.convId === "null" ? null : Number(row.dataset.convId));
    });

    const broadcastBtn = document.getElementById("chat-broadcast-btn");
    if(broadcastBtn){
      broadcastBtn.onclick = openBroadcastModal;
    }
  }

  function convRowHTML(other, preview, unread, convId){
    const roleText = roleLabel(other.role);
    const previewText = preview ? escapeHtml(preview) : `<i style='color:#b8c4d3'>${T.startChat}</i>`;
    const isOnline = _onlineUsers.has(other.id);
    const dot = isOnline 
      ? `<span class="online-dot" title="${T.online}"></span>`
      : `<span class="offline-dot" title="${T.offline}"></span>`;
    return `<div class="conv-row" data-other-id="${other.id}" data-conv-id="${convId || 'null'}">
      <div class="who">
        <b>${escapeHtml(other.full_name || other.email || "—")}${dot}<span class="role-tag">${roleText}</span></b>
        <div class="preview">${previewText}</div>
      </div>
      ${unread > 0 ? `<span class="unread">${unread}</span>` : ""}
    </div>`;
  }

  function escapeHtml(s){
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  async function openChatRoom(otherUserId, convId){
    if(!convId){
      convId = await ensureConversation(otherUserId);
      if(!convId){ alert(T.convCreateFailed); return; }
    }
    _activeConvId = convId;
    document.getElementById("chat-list-panel").classList.remove("open");
    document.getElementById("chat-room").classList.add("open");

    const conv = _conversations.find(c => c.id === convId);
    const other = conv ? conv.other : _possibleContacts.find(p => p.id === otherUserId);
    document.getElementById("chat-room-name").textContent = other?.full_name || other?.email || "—";
    document.getElementById("chat-room-role").textContent = roleLabel(other?.role || "");

    if(other){
      const isOnline = _onlineUsers.has(other.id);
      const roleEl = document.getElementById("chat-room-role");
      const oldDot = roleEl.parentElement.querySelector(".online-dot, .offline-dot");
      if(oldDot) oldDot.remove();
      const dot = document.createElement("span");
      dot.className = isOnline ? "online-dot" : "offline-dot";
      dot.title = isOnline ? T.online : T.offline;
      roleEl.parentElement.appendChild(dot);
    }

    await loadMessages(convId);
    await markAsRead(convId);
    await loadConversations();
    renderChatList();
  }

  async function ensureConversation(otherUserId){
    if(!otherUserId) return null;
    const myRole = _me.role;
    const otherProfile = _possibleContacts.find(p => p.id === otherUserId);
    if(!otherProfile) return null;
    const otherRole = otherProfile.role;

    let type = null;
    let pa, pb;
    if((myRole === "student" && otherRole === "admin") || (myRole === "admin" && otherRole === "student")){
      type = "student_admin";
      pa = myRole === "student" ? _me.id : otherUserId;
      pb = myRole === "admin" ? _me.id : otherUserId;
    } else if((myRole === "teacher" && otherRole === "manager") || (myRole === "manager" && otherRole === "teacher")){
      type = "teacher_manager";
      pa = myRole === "teacher" ? _me.id : otherUserId;
      pb = myRole === "manager" ? _me.id : otherUserId;
    } else if((myRole === "admin" && otherRole === "manager") || (myRole === "manager" && otherRole === "admin")){
      type = "admin_manager";
      pa = myRole === "admin" ? _me.id : otherUserId;
      pb = myRole === "manager" ? _me.id : otherUserId;
    }
    if(!type) return null;

    const { data:existing } = await _sb.from("conversations")
      .select("id")
      .eq("type", type)
      .eq("participant_a", pa)
      .eq("participant_b", pb)
      .maybeSingle();

    if(existing){ return existing.id; }

    const { data:created, error } = await _sb.from("conversations")
      .insert({ type, participant_a: pa, participant_b: pb })
      .select("id")
      .single();

    if(error){ console.error("[chat] conversation create failed:", error); return null; }
    return created.id;
  }

  async function loadMessages(convId){
    const { data } = await _sb.from("messages")
      .select("id, sender_id, content, created_at, broadcast_id")
      .eq("conversation_id", convId)
      .order("created_at", { ascending: true })
      .limit(200);
    _messages = data || [];
    renderMessages(true);   // 대화 열 때는 항상 최신(맨 아래)으로
  }

  function renderMessages(forceBottom){
    const el = document.getElementById("chat-messages");
    // 렌더 전 스크롤 상태 저장 (사용자가 위로 올려 읽는 중이면 아래로 튕기지 않도록)
    const prevTop = el.scrollTop;
    const nearBottom = (el.scrollHeight - prevTop - el.clientHeight) < 60;
    let html = "";
    let lastDate = "";
    _messages.forEach(m => {
      const d = new Date(m.created_at);
      const dateStr = d.toLocaleDateString(T.dateLocale, { month:"long", day:"numeric", weekday:"short" });
      if(dateStr !== lastDate){
        html += `<div class="date-divider">─ ${dateStr} ─</div>`;
        lastDate = dateStr;
      }
      const mine = m.sender_id === _me.id;
      const timeStr = d.toLocaleTimeString(T.dateLocale, { hour:"2-digit", minute:"2-digit" });
      const broadcastLabel = m.broadcast_id 
        ? `<div style="font-size:.7rem;color:#c98a1f;font-weight:700;margin-bottom:3px">${T.broadcastLabel}</div>`
        : "";
      const bgColor = m.broadcast_id 
        ? (mine ? "background:#c98a1f" : "background:#fff7e6;border-color:#c98a1f")
        : "";
      html += `<div class="msg ${mine ? "mine" : "theirs"}" style="${bgColor}">${broadcastLabel}${escapeHtml(m.content)}</div>`;
      html += `<div class="msg-time" style="${mine ? "text-align:right" : "text-align:left"}">${timeStr}</div>`;
    });
    if(!html) html = `<div class="empty" style="margin:auto;color:#6b7785">${T.noMessages}</div>`;
    el.innerHTML = html;
    // 맨 아래에 있었거나(=최신 확인 중) 강제 지정 시에만 맨 아래로, 아니면 읽던 위치 유지
    if(forceBottom || nearBottom) el.scrollTop = el.scrollHeight;
    else el.scrollTop = prevTop;
  }

  window.sendChatMessage = async function(){
    if(!_activeConvId) return;
    const input = document.getElementById("chat-input");
    const content = input.value.trim();
    if(!content) return;
    document.getElementById("chat-send").disabled = true;
    const { error } = await _sb.from("messages").insert({
      conversation_id: _activeConvId,
      sender_id: _me.id,
      content,
    });
    document.getElementById("chat-send").disabled = false;
    if(error){ alert(T.sendFailed + error.message); return; }
    input.value = "";
    input.style.height = "36px";
  };

  window.openBroadcastModal = function(){
    const modal = document.getElementById("chat-broadcast-modal");
    const title = document.getElementById("chat-bc-title");
    const sub = document.getElementById("chat-bc-sub");
    const info = document.getElementById("chat-bc-info");
    const sendBtn = document.getElementById("chat-bc-send");
    const targetRole = _me.role === "admin" ? "student" : "teacher";
    const count = _possibleContacts.filter(p => p.role === targetRole).length;
    
    if(targetRole === "student"){
      title.textContent = T.broadcastTitleStudents;
      sub.textContent = T.broadcastSubStudents;
      info.innerHTML = T.broadcastInfoStudents(count);
    } else {
      title.textContent = T.broadcastTitleTeachers;
      sub.textContent = T.broadcastSubTeachers;
      info.innerHTML = T.broadcastInfoTeachers(count);
    }
    sendBtn.textContent = T.bcSend;
    document.getElementById("chat-bc-content").value = "";
    modal.style.display = "flex";
  };

  window.closeBroadcastModal = function(){
    document.getElementById("chat-broadcast-modal").style.display = "none";
  };

  window.confirmBroadcast = async function(){
    const content = document.getElementById("chat-bc-content").value.trim();
    if(!content){ alert(T.broadcastEnter); return; }
    const targetRole = _me.role === "admin" ? "student" : "teacher";
    const count = _possibleContacts.filter(p => p.role === targetRole).length;
    
    const previewContent = content.substring(0,100) + (content.length>100?"…":"");
    const confirmMsg = targetRole === "student" 
      ? T.broadcastConfirmStudents(count, previewContent)
      : T.broadcastConfirmTeachers(count, previewContent);
    if(!confirm(confirmMsg)) return;

    const btn = document.getElementById("chat-bc-send");
    btn.disabled = true;
    btn.textContent = T.broadcastSending;

    const { data, error } = await _sb.rpc("send_broadcast", {
      p_target_role: targetRole,
      p_content: content,
    });

    btn.disabled = false;
    btn.textContent = T.bcSend;

    if(error){
      alert(T.broadcastSendFailed + error.message);
      return;
    }
    if(data?.error){
      alert(T.broadcastSendFailed + data.error);
      return;
    }

    alert(T.broadcastDone(data.recipient_count));
    closeBroadcastModal();
    await loadConversations();
    renderChatList();
  };

  async function markAsRead(convId){
    await _sb.from("message_reads").upsert({
      user_id: _me.id,
      conversation_id: convId,
      last_read_at: new Date().toISOString(),
    });
  }

  function setupRealtime(){
    if(_realtimeChannel) _sb.removeChannel(_realtimeChannel);
    _realtimeChannel = _sb.channel("chat-widget-" + _me.id)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages" }, async (payload) => {
        const m = payload.new;
        const myConv = _conversations.find(c => c.id === m.conversation_id);
        const isMine = m.sender_id === _me.id;
        if(!myConv && !isMine) {
          await loadConversations();
          renderChatList();
          return;
        }

        if(_activeConvId === m.conversation_id){
          if(_messages.some(existing => existing.id === m.id)) return;
          _messages.push(m);
          renderMessages(isMine);   // 내가 보낸 것만 맨 아래로, 상대 메시지는 읽던 위치 유지
          if(!isMine) markAsRead(m.conversation_id);
        } else {
          await loadConversations();
          renderChatList();
        }
      })
      .subscribe();
  }

  function setupPresence(){
    if(_presenceChannel) _sb.removeChannel(_presenceChannel);

    _presenceChannel = _sb.channel("online-users", {
      config: { presence: { key: _me.id } }
    });

    _presenceChannel
      .on("presence", { event: "sync" }, () => {
        const state = _presenceChannel.presenceState();
        _onlineUsers = new Set(Object.keys(state));
        _onlineUsers.delete(_me.id);
        renderChatList();
        updateChatRoomOnlineStatus();
      })
      .on("presence", { event: "join" }, ({ key }) => {
        if(key !== _me.id){
          _onlineUsers.add(key);
          renderChatList();
          updateChatRoomOnlineStatus();
        }
      })
      .on("presence", { event: "leave" }, ({ key }) => {
        _onlineUsers.delete(key);
        renderChatList();
        updateChatRoomOnlineStatus();
      })
      .subscribe(async (status) => {
        if(status === "SUBSCRIBED"){
          await _presenceChannel.track({
            user_id: _me.id,
            online_at: new Date().toISOString(),
          });
        }
      });
  }

  function updateChatRoomOnlineStatus(){
    if(!_activeConvId) return;
    const conv = _conversations.find(c => c.id === _activeConvId);
    if(!conv) return;
    const otherId = conv.other.id;
    const roleEl = document.getElementById("chat-room-role");
    if(!roleEl) return;
    const isOnline = _onlineUsers.has(otherId);
    const oldDot = roleEl.parentElement.querySelector(".online-dot, .offline-dot");
    if(oldDot) oldDot.remove();
    const dot = document.createElement("span");
    dot.className = isOnline ? "online-dot" : "offline-dot";
    dot.title = isOnline ? T.online : T.offline;
    roleEl.parentElement.appendChild(dot);
  }

  window.toggleChatDock = async function(){
    const panel = document.getElementById("chat-list-panel");
    const tab = document.getElementById("chat-tab");
    const room = document.getElementById("chat-room");
    if(panel.classList.contains("open") || room.classList.contains("open")){
      panel.classList.remove("open");
      room.classList.remove("open");
      tab.classList.remove("hidden");
      _activeConvId = null;
    } else {
      tab.classList.add("hidden");
      
      if(_me.role === "student"){
        await loadConversations();
        const admins = _possibleContacts.filter(p => p.role === "admin");
        if(admins.length > 0){
          await openChatRoom(admins[0].id, null);
          return;
        }
      }
      
      panel.classList.add("open");
      loadConversations().then(renderChatList);
    }
  };

  window.closeChatRoom = function(){
    document.getElementById("chat-room").classList.remove("open");
    _activeConvId = null;
    
    if(_me.role === "student"){
      document.getElementById("chat-tab").classList.remove("hidden");
      return;
    }
    
    document.getElementById("chat-list-panel").classList.add("open");
    loadConversations().then(renderChatList);
  };

  function setupSearchHandler(){
    document.getElementById("chat-search").addEventListener("input", renderChatList);
  }

  function setupInputHandler(){
    const input = document.getElementById("chat-input");
    let isComposing = false;

    input.addEventListener("compositionstart", () => { isComposing = true; });
    input.addEventListener("compositionend", () => { isComposing = false; });

    input.addEventListener("keydown", (e) => {
      if(isComposing || e.isComposing || e.keyCode === 229) return;
      if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendChatMessage();
      }
    });
    input.addEventListener("input", () => {
      input.style.height = "36px";
      input.style.height = Math.min(input.scrollHeight, 80) + "px";
    });
  }

  function startWhenReady(attempts){
    attempts = attempts || 0;
    if(!window.sb){
      if(attempts > 30){ console.error("[chat] window.sb not ready after 6s, giving up"); return; }
      setTimeout(() => startWhenReady(attempts + 1), 200);
      return;
    }
    console.log("[chat] sb ready, calling init (attempt", attempts, ")");
    init()
      .then(() => console.log("[chat] init completed"))
      .catch(err => console.error("[chat] init failed:", err));
  }
  console.log("[chat] widget script loaded, waiting for sb");
  startWhenReady();
})();
</script>
